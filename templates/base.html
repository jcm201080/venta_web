<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <!-- 🔥 Open Graph para LinkedIn -->
    <meta property="og:title" content="Páginas web para negocios en 24h | JCM Web Solutions">
    <meta property="og:description"
        content="Consigue más clientes con una web profesional para tu negocio. Especial para bares, catering y eventos.">
    <meta property="og:image" content="https://creacion.jesuscmweb.com/static/img/preview.png">
    <meta property="og:url" content="https://creacion.jesuscmweb.com/">
    <meta property="og:type" content="website">
    <meta property="article:author" content="Jesús Castaño">
    <meta name="description" content="Páginas web rápidas para negocios. Especialistas en bares, catering y eventos.">
    <title>{% block title %}JCM Web{% endblock %}</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='img/favicon.png') }}">
</head>

<body>

    <header class="header">
        <div class="logo">
            <img src="{{ url_for('static', filename='img/logo.png') }}" alt="JCM Web Solutions">
        </div>
        <nav class="nav">
            <a href="/" class="{% if request.path == '/' %}activo{% endif %}">Inicio</a>
            <a href="/servicios" class="{% if request.path.startswith('/servicios') %}activo{% endif %}">Servicios</a>
            <a href="/precios" class="{% if request.path.startswith('/precios') %}activo{% endif %}">Precios</a>
            <a href="/portfolio" class="{% if request.path.startswith('/portfolio') %}activo{% endif %}">Portfolio</a>
            <a href="/contacto" class="{% if request.path.startswith('/contacto') %}activo{% endif %}">Contacto</a>
            <a href="/feria" class="{% if request.path.startswith('/feria') %}activo{% endif %}">
                🔥 Feria
            </a>

            <!-- 🔥 barra -->
            <div class="nav-slider"></div>
        </nav>
    </header>

    {% block content %}
    {% endblock %}

    <!-- 🤖 BOTÓN CHAT -->
    <div id="chat-toggle">💬</div>

    <!-- 🤖 CHAT -->
    <div id="chatbot" class="hidden">
        <div id="chat-header">
            <span>Asistente ✨</span>
            <button id="chat-close">✖</button>
        </div>
        <div id="chat-body"></div>
        <input type="text" id="chat-input" placeholder="Escribe aquí...">
    </div>

    <!-- 📲 WHATSAPP GLOBAL -->
    <a href="/track_whatsapp" class="whatsapp">
        💬
    </a>

    <footer class="footer">
        <p>© 2026 JCM Web Solutions</p>
    </footer>
    <script src="{{ url_for('static', filename='js/chat.js') }}"></script>
</body>

</html>
